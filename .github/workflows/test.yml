name: Test

"on":
  push:
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          version: "0.11.25"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest
