name: Test

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          version: "0.11.25"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest --cov --cov-branch --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  mutation-test:
    runs-on: ubuntu-24.04
    # Mutation testing is a code-quality signal, not a merge gate: full-suite
    # mutant runs take far longer than the regular test job, so this reports
    # survivors without blocking pull requests.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          version: "0.11.25"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run mutation tests
        run: uv run mutmut run --max-children 4 || true

      - name: Report surviving mutants
        run: uv run mutmut results

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutmut-html-report
          path: mutants/
          retention-days: 14
