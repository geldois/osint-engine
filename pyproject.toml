[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "lynx"
version = "0.0.1"
description = "An asynchronous Python API designed for public security intelligence, cross-referencing corporate data from multiple external APIs to detect corruption indicators."
dependencies = [
  "fastapi",
  "httpx",
  "psycopg[binary]",
  "sqlalchemy",
  "typer",
  "uvicorn"
]

[project.optional-dependencies]
dev = [
  "commitizen",
  "pre-commit",
  "pyright",
  "pytest",
  "ruff"
]

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_scheme = "semver"
version_provider = "pep621"
update_map_pyproject = true

[tool.pyright]
typeCheckingMode = "strict"
include = ["src", "tests"]

[tool.pytest.ini_options]
pythonpath = ["src", "tests"]

[tool.ruff]
line-length = 88
indent-width = 4
target-version = "py312"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.setuptools.packages.find]
where = ["src"]
