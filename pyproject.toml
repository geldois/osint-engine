[project]
name = "osint-engine"
version = "1.1.0"
description = "Entity relationship graph engine that expands identifiers into a fully traceable network of connections sourced exclusively from official public records"
requires-python = ">=3.12"
dependencies = ["fastapi", "structlog", "typer", "uvicorn"]

[dependency-groups]
dev = [
  "basedpyright",
  "commitizen",
  "httpx2",
  "pre-commit",
  "pytest",
  "pytest-asyncio",
  "pytest-language-server",
  "ruff"
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.basedpyright]
venvPath = "."
venv = ".venv"
include = ["src", "tests"]
typeCheckingMode = "strict"
pythonPlatform = "All"
reportMissingTypeStubs = "none"

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_scheme = "semver"
version_provider = "pep621"
update_map_pyproject = true

[tool.pytest.ini_options]
pythonpath = ["src", "tests"]
asyncio_mode = "strict"

[tool.pytest-language-server]
exclude = ["build/**", "dist/**", ".tox/**"]

[tool.ruff]
line-length = 88

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true

[tool.ruff.lint]
select = ["ALL"]
ignore = ["COM812", "D", "D100", "D101", "D203", "D212", "ISC001", "RUF012"]

[tool.ruff.lint.extend-per-file-ignores]
"tests/**/*.py" = ["PLR2004", "S101"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv]
