[project]
name = "osint-engine"
version = "1.1.0"
description = "Entity relationship graph engine that expands identifiers into a fully traceable network of connections sourced exclusively from official public records"
authors = [{ name = "Angelito Chagas", email = "chagasangelito@gmail.com" }]
license = "MIT"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
keywords = ["osint", "graph", "cnpj", "brazil", "entity-resolution"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
]
dependencies = [
  "fastapi>=0.136,<1",
  "httpx2>=2.4,<3",
  "pydantic>=2.13,<3",
  "structlog>=25.5,<27",
  "typer>=0.26,<1",
  "uvicorn>=0.48,<1",
]

[project.urls]
Repository = "https://github.com/geldois/osint-engine"

[dependency-groups]
dev = [
  "basedpyright>=1.39,<2",
  "commitizen>=4.16,<5",
  "pre-commit>=4.6,<5",
  "pytest>=9.0,<10",
  "pytest-asyncio>=1.4,<2",
  "ruff>=0.15,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.basedpyright]
venvPath = "."
venv = ".venv"
include = ["src", "tests"]
typeCheckingMode = "strict"
pythonPlatform = "All"
reportMissingTypeStubs = "none"

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_scheme = "semver"
version_provider = "pep621"
update_map_pyproject = true

[tool.hatch.build.targets.wheel]
packages = ["src/osint_engine"]

[tool.pytest.ini_options]
asyncio_mode = "strict"

[tool.ruff]
line-length = 88

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true

[tool.ruff.lint]
select = ["ALL"]
ignore = ["COM812", "D", "D100", "D101", "D203", "D212", "ISC001", "RUF012"]

[tool.ruff.lint.extend-per-file-ignores]
"tests/**/*.py" = ["PLR2004", "S101"]

[tool.ruff.lint.pydocstyle]
convention = "google"
